# Autostart processes

# Launch applications on specific workspaces without timed dispatch chains
  exec-once = [workspace 2 silent] code $HOME/Code
  exec-once = [workspace 3 silent; fullscreen; noborder] alacritty
  exec-once = [workspace 4 silent; fullscreen; noborder] alacritty --working-directory $HOME/Code/linux -e lazygit
  exec-once = [workspace 6 silent] sh -c 'sleep 2 && chromium --new-window https://gmail.com'
  exec-once = [workspace 7 silent; fullscreen; noborder] alacritty -e btop

# Start the global Podman MySQL server only if it is not already running.
  exec-once = bash -c 'systemctl --user is-active --quiet container-devsql.service || systemctl --user start container-devsql.service'
